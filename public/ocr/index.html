<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR — 1s.xyz</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <script>
  (function(){
    var k="1s-theme",s=localStorage.getItem(k),t;
    if(s==="light"||s==="dark")t=s;
    else t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";
    document.documentElement.setAttribute("data-theme",t);
  })();
  </script>
  <style>
    :root,[data-theme="light"]{--bg:#fff;--fg:#1a1a2e;--accent:#0f3460;--muted:#64748b}
    [data-theme="dark"]{--bg:#0f172a;--fg:#e2e8f0;--accent:#60a5fa;--muted:#94a3b8}
    *{margin:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);
      display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
    h1{font-size:2rem;margin-bottom:.5rem}
    p{color:var(--muted);font-size:1.1rem;margin-bottom:1.5rem}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main>
    <h1>OCR</h1>
    <p>準備中</p>
    <a href="/">← 1s.xyz トップへ</a>
  </main>
</body>
</html>
